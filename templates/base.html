<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jedLoft Web</title>
    <meta name="theme-color" content="#2f6d62" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="{{ theme_class }} {{ text_size_class }}">
    {% if nav_user %}
    <header class="topbar">
      <div class="brand">jedLoft v2</div>
      <nav class="menu">
        <a href="/dashboard">Dashboard</a>
        <a href="/settings">Settings</a>
        <a href="/android-client">Android Client</a>
        {% if nav_user.role == "admin" %}
        <a href="/admin">Admin</a>
        {% endif %}
        <form method="post" action="/logout" class="inline-form">
          <button type="submit" class="danger">Logout</button>
        </form>
      </nav>
    </header>
    {% endif %}
    <main class="container {% if nav_user %}container-with-nav{% endif %}">
      {% block content %}{% endblock %}
    </main>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/static/mobile-sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
