{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1>Create Account</h1>
  <p class="subtitle">Self-registration creates a read-only account pending admin approval.</p>
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" action="/register" class="form-grid">
    <label for="name">Name</label>
    <input id="name" name="name" type="text" required />

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" minlength="6" required />
    <p class="meta">Password policy: minimum 6 characters and at least 2 uppercase letters.</p>

    <button type="submit">Create Account</button>
  </form>
  <p class="meta">Already have an account? <a href="/login">Sign in</a>.</p>
</section>
{% endblock %}
