services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jedloft-web
    ports:
      - "8000:8000"
    env_file:
      - example.env
      - .env
    volumes:
      - ./:/app
      - ./data:/app/data
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: jedloft-db
    environment:
      POSTGRES_DB: jedloft
      POSTGRES_USER: jedloft
      POSTGRES_PASSWORD: jedloft
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
