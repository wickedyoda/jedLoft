services:
  web:
    image: ${IMAGE_NAME:-ghcr.io/wickedyoda/jedloft:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jedloft-web
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - example.env
      - .env
    environment:
      LOG_DIR: ${LOG_DIR:-/logs}
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-me}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-System Admin}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@example.com}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-AdminAA1}
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./logs:/logs
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: jedloft-db
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jedloft}
      MYSQL_USER: ${MYSQL_USER:-jedloft}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-jedloft}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    restart: unless-stopped
